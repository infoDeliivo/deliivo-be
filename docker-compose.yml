services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-deliivo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-deliivo_secret}
      POSTGRES_DB: ${POSTGRES_DB:-deliivo}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-deliivo}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        DATABASE_URL: ${DATABASE_URL:-postgresql://deliivo:deliivo_secret@postgres:5432/deliivo}
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${PORT:-3000}
      DATABASE_URL: postgresql://${POSTGRES_USER:-deliivo}:${POSTGRES_PASSWORD:-deliivo_secret}@postgres:5432/${POSTGRES_DB:-deliivo}
      REDIS_URL: redis://redis:6379
      REDIS_HOST: redis
      REDIS_PORT: 6379
      ACCESS_TOKEN_SECRET: ${ACCESS_TOKEN_SECRET:-change_me}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET:-change_me}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      BOOKING_PAYMENT_MODE: ${BOOKING_PAYMENT_MODE:-bypass}
      PLATFORM_FEE_PERCENT: ${PLATFORM_FEE_PERCENT:-0}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
      GOOGLE_MAPS_MOCK_MODE: ${GOOGLE_MAPS_MOCK_MODE:-true}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:8080,http://localhost:3001}
      EXPOSE_OTP_IN_RESPONSE: ${EXPOSE_OTP_IN_RESPONSE:-true}
      DISABLE_RATE_LIMIT: ${DISABLE_RATE_LIMIT:-true}
      SMS_MOCK_MODE: ${SMS_MOCK_MODE:-true}
      SKIP_DL_VERIFICATION: ${SKIP_DL_VERIFICATION:-true}
      ALLOW_RIDE_SIMULATION: ${ALLOW_RIDE_SIMULATION:-false}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_REGION: ${AWS_REGION:-eu-north-1}
      AWS_S3_BUCKET_NAME: ${AWS_S3_BUCKET_NAME:-}
      FIREBASE_SERVICE_ACCOUNT_PATH: /app/firebase-sa.json
    volumes:
      - ./carpooling-37720-firebase-adminsdk-fbsvc-26fe9c4eaf.json:/app/firebase-sa.json:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  mail-worker:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        DATABASE_URL: ${DATABASE_URL:-postgresql://deliivo:deliivo_secret@postgres:5432/deliivo}
    restart: unless-stopped
    env_file:
      - .env
    command: ["node", "dist/modules/mail/mail.worker.js"]
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: postgresql://${POSTGRES_USER:-deliivo}:${POSTGRES_PASSWORD:-deliivo_secret}@postgres:5432/${POSTGRES_DB:-deliivo}
      REDIS_URL: redis://redis:6379
      ALLOW_RIDE_SIMULATION: ${ALLOW_RIDE_SIMULATION:-false}
    depends_on:
      - backend

  sms-worker:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        DATABASE_URL: ${DATABASE_URL:-postgresql://deliivo:deliivo_secret@postgres:5432/deliivo}
    restart: unless-stopped
    env_file:
      - .env
    command: ["node", "dist/modules/sms/sms.worker.js"]
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: postgresql://${POSTGRES_USER:-deliivo}:${POSTGRES_PASSWORD:-deliivo_secret}@postgres:5432/${POSTGRES_DB:-deliivo}
      REDIS_URL: redis://redis:6379
      ALLOW_RIDE_SIMULATION: ${ALLOW_RIDE_SIMULATION:-false}
    depends_on:
      - backend

  seed:
    build:
      context: .
      dockerfile: Dockerfile
      target: base
      args:
        DATABASE_URL: ${DATABASE_URL:-postgresql://deliivo:deliivo_secret@postgres:5432/deliivo}
    restart: "no"
    profiles:
      - seed
    env_file:
      - .env
    command: ["sh", "-c", "npx prisma migrate deploy && npm run db:seed"]
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: postgresql://${POSTGRES_USER:-deliivo}:${POSTGRES_PASSWORD:-deliivo_secret}@postgres:5432/${POSTGRES_DB:-deliivo}
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        # Build-time args for NEXT_PUBLIC_ vars (baked into client bundle)
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-}
        NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${NEXT_PUBLIC_GOOGLE_MAPS_API_KEY:-}
        NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY:-}
        NEXT_PUBLIC_ALLOW_RIDE_SIMULATION: ${ALLOW_RIDE_SIMULATION:-false}
        NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL:-http://localhost:3000}
        NEXT_PUBLIC_FIREBASE_API_KEY: ${NEXT_PUBLIC_FIREBASE_API_KEY:-}
        NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN:-}
        NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${NEXT_PUBLIC_FIREBASE_PROJECT_ID:-}
        NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET:-}
        NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID:-}
        NEXT_PUBLIC_FIREBASE_APP_ID: ${NEXT_PUBLIC_FIREBASE_APP_ID:-}
        NEXT_PUBLIC_FIREBASE_VAPID_KEY: ${NEXT_PUBLIC_FIREBASE_VAPID_KEY:-}
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8080:3001"
    environment:
      # Runtime env for the Next.js server (proxy route)
      BACKEND_URL: http://backend:3000
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
