{
  "ApiSuccessEnvelope": {
    "type": "object",
    "additionalProperties": false,
    "properties": {
      "success": {
        "const": true
      },
      "status": {
        "type": "string",
        "enum": [
          "OK",
          "CREATED"
        ]
      },
      "message": {
        "type": "string"
      },
      "data": {
        "oneOf": [
          {
            "type": "object",
            "additionalProperties": true
          },
          {
            "type": "array",
            "items": {}
          },
          {
            "type": "string"
          },
          {
            "type": "number"
          },
          {
            "type": "boolean"
          },
          {
            "type": "null"
          }
        ]
      }
    },
    "required": [
      "success",
      "status",
      "message",
      "data"
    ]
  },
  "ApiErrorEnvelope": {
    "type": "object",
    "additionalProperties": false,
    "properties": {
      "success": {
        "const": false
      },
      "status": {
        "type": "string",
        "enum": [
          "BAD_REQUEST",
          "UNAUTHORIZED",
          "FORBIDDEN",
          "NOT_FOUND",
          "CONFLICT",
          "TOO_MANY_REQUESTS",
          "INTERNAL_ERROR"
        ]
      },
      "message": {
        "type": "string"
      },
      "error": {
        "oneOf": [
          {
            "type": "object",
            "additionalProperties": true
          },
          {
            "type": "array",
            "items": {}
          },
          {
            "type": "string"
          },
          {
            "type": "number"
          },
          {
            "type": "boolean"
          },
          {
            "type": "null"
          }
        ]
      }
    },
    "required": [
      "success",
      "status",
      "message"
    ]
  },
