{
  "paths": {
    "/api/v1/notifications": {
      "get": {
        "operationId": "notificationsGet",
        "summary": "GET notifications",
        "tags": [
          "Notifications"
        ],
        "security": [
          {
            "BearerAuth": []
          }
        ],
        "responses": {
          "200": {
            "description": "Success",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "../components/schemas/common.yaml#/NotificationList"
                },
                "examples": {
                  "default": {
                    "$ref": "../components/examples/common.yaml#/NotificationListSuccess"
                  }
                }
              }
            }
          },
          "400": {
            "$ref": "../components/responses/errors.yaml#/BadRequest"
          },
          "401": {
            "$ref": "../components/responses/errors.yaml#/Unauthorized"
          },
          "403": {
            "$ref": "../components/responses/errors.yaml#/Forbidden"
          },
          "404": {
            "$ref": "../components/responses/errors.yaml#/NotFound"
          },
          "500": {
            "$ref": "../components/responses/errors.yaml#/ServerError"
          }
        },
        "parameters": [
          {
            "$ref": "../components/parameters/common.yaml#/CursorQuery"
          },
          {
            "$ref": "../components/parameters/common.yaml#/LimitQuery"
          }
        ]
      },
      "delete": {
        "operationId": "notificationsClearAll",
        "summary": "Clear all notifications for the current user",
        "tags": ["Notifications"],
        "security": [{ "BearerAuth": [] }],
        "responses": {
          "200": { "description": "Notifications cleared" },
          "401": { "$ref": "../components/responses/errors.yaml#/Unauthorized" },
          "500": { "$ref": "../components/responses/errors.yaml#/ServerError" }
        }
      }
    },
    "/api/v1/notifications/mark-read": {
      "post": {
        "operationId": "notificationsPostRead",
        "summary": "POST notifications/read",
        "tags": [
          "Notifications"
        ],
        "security": [
          {
            "BearerAuth": []
          }
        ],
        "responses": {
          "200": {
            "description": "Success",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "../components/schemas/common.yaml#/NotificationList"
                },
                "examples": {
                  "default": {
                    "$ref": "../components/examples/common.yaml#/NotificationMarkReadRequest"
                  }
                }
              }
            }
          },
          "400": {
            "$ref": "../components/responses/errors.yaml#/BadRequest"
          },
          "401": {
            "$ref": "../components/responses/errors.yaml#/Unauthorized"
          },
          "403": {
            "$ref": "../components/responses/errors.yaml#/Forbidden"
          },
          "404": {
            "$ref": "../components/responses/errors.yaml#/NotFound"
          },
          "500": {
            "$ref": "../components/responses/errors.yaml#/ServerError"
          }
        },
        "requestBody": {
          "required": true,
          "content": {
            "application/json": {
              "schema": {
                "type": "object",
                "additionalProperties": false,
                "required": [
                  "notificationIds"
                ],
                "properties": {
                  "notificationIds": {
                    "type": "array",
                    "items": {
                      "type": "string",
                      "format": "uuid"
                    },
                    "minItems": 1
                  }
                }
              }
            }
          }
        }
      }
    },
    "/api/v1/notifications/unread-count": {
      "get": {
        "operationId": "notificationsGetUnreadCount",
        "summary": "GET notifications/unread-count",
        "tags": [
          "Notifications"
        ],
        "security": [
          {
            "BearerAuth": []
          }
        ],
        "responses": {
          "200": {
            "description": "Success",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "../components/schemas/common.yaml#/UnreadCount"
                },
                "examples": {
                  "default": {
                    "$ref": "../components/examples/common.yaml#/NotificationUnreadSuccess"
                  }
                }
              }
            }
          },
          "400": {
            "$ref": "../components/responses/errors.yaml#/BadRequest"
          },
          "401": {
            "$ref": "../components/responses/errors.yaml#/Unauthorized"
          },
          "403": {
            "$ref": "../components/responses/errors.yaml#/Forbidden"
          },
          "404": {
            "$ref": "../components/responses/errors.yaml#/NotFound"
          },
          "500": {
            "$ref": "../components/responses/errors.yaml#/ServerError"
          }
        }
      }
    },
    "/api/v1/notifications/device-token": {
      "post": {
        "operationId": "notificationsPostDevicesRegister",
        "summary": "POST notifications/devices/register",
        "tags": [
          "Notifications"
        ],
        "security": [
          {
            "BearerAuth": []
          }
        ],
        "responses": {
          "201": {
            "description": "Created",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "../components/schemas/common.yaml#/DeviceToken"
                },
                "examples": {
                  "default": {
                    "$ref": "../components/examples/common.yaml#/NotificationDeviceSuccess"
                  }
                }
              }
            }
          },
          "400": {
            "$ref": "../components/responses/errors.yaml#/BadRequest"
          },
          "401": {
            "$ref": "../components/responses/errors.yaml#/Unauthorized"
          },
          "403": {
            "$ref": "../components/responses/errors.yaml#/Forbidden"
          },
          "404": {
            "$ref": "../components/responses/errors.yaml#/NotFound"
          },
          "500": {
            "$ref": "../components/responses/errors.yaml#/ServerError"
          }
        },
        "requestBody": {
          "required": true,
          "content": {
            "application/json": {
              "schema": {
                "type": "object",
                "additionalProperties": false,
                "required": [
                  "platform",
                  "token"
                ],
                "properties": {
                  "platform": {
                    "type": "string"
                  },
                  "token": {
                    "type": "string"
                  }
                }
              }
            }
          }
        }
      }
    },
    "/api/v1/notifications/{notificationId}": {
      "delete": {
        "operationId": "notificationsDeleteOne",
        "summary": "Remove one notification owned by the current user",
        "tags": ["Notifications"],
        "security": [{ "BearerAuth": [] }],
        "parameters": [
          {
            "name": "notificationId",
            "in": "path",
            "required": true,
            "schema": { "type": "string", "format": "uuid" }
          }
        ],
        "responses": {
          "200": { "description": "Notification removed" },
          "400": { "$ref": "../components/responses/errors.yaml#/BadRequest" },
          "401": { "$ref": "../components/responses/errors.yaml#/Unauthorized" },
          "500": { "$ref": "../components/responses/errors.yaml#/ServerError" }
        }
      }
    },
