          "Notifications"
        ],
        "security": [
          {
            "BearerAuth": []
          }
        ],
        "responses": {
          "200": {
            "description": "Success",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "../components/schemas/common.yaml#/DeviceToken"
                },
                "examples": {
                  "default": {
                    "$ref": "../components/examples/common.yaml#/NotificationDeviceSuccess"
                  }
                }
              }
            }
          },
          "400": {
            "$ref": "../components/responses/errors.yaml#/BadRequest"
          },
          "401": {
            "$ref": "../components/responses/errors.yaml#/Unauthorized"
          },
          "403": {
            "$ref": "../components/responses/errors.yaml#/Forbidden"
          },
          "404": {
            "$ref": "../components/responses/errors.yaml#/NotFound"
