{
  "paths": {
    "/api/v1/driver/bookings/{id}/accept": {
      "post": {
        "operationId": "driverBookingsPostByIdAccept",
        "summary": "POST driver-bookings/:id/accept",
        "tags": [
          "Driver Bookings"
        ],
        "security": [
          {
            "BearerAuth": []
          }
        ],
        "responses": {
          "200": {
            "description": "Success",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "../components/schemas/common.yaml#/ApiSuccessEnvelope"
                },
                "examples": {
                  "default": {
                    "$ref": "../components/examples/common.yaml#/DriverBookingSuccess"
                  }
                }
              }
            }
          },
          "400": {
            "$ref": "../components/responses/errors.yaml#/BadRequest"
          },
          "401": {
            "$ref": "../components/responses/errors.yaml#/Unauthorized"
          },
          "403": {
            "$ref": "../components/responses/errors.yaml#/Forbidden"
          },
          "404": {
            "$ref": "../components/responses/errors.yaml#/NotFound"
          },
          "409": {
            "$ref": "../components/responses/errors.yaml#/Conflict"
          },
          "500": {
            "$ref": "../components/responses/errors.yaml#/ServerError"
          }
        },
        "parameters": [
          {
            "$ref": "../components/parameters/common.yaml#/IdPath"
          }
        ]
      }
    },
    "/api/v1/driver/bookings/{id}/reject": {
      "post": {
        "operationId": "driverBookingsPostByIdReject",
        "summary": "POST driver-bookings/:id/reject",
        "description": "Driver rejects a booking request. Requires a reason for rejection.",
        "tags": [
          "Driver Bookings"
        ],
        "security": [
          {
            "BearerAuth": []
          }
        ],
        "responses": {
          "200": {
            "description": "Success",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "../components/schemas/common.yaml#/ApiSuccessEnvelope"
                },
                "examples": {
                  "default": {
                    "$ref": "../components/examples/common.yaml#/DriverBookingSuccess"
                  }
                }
              }
            }
          },
          "400": {
            "$ref": "../components/responses/errors.yaml#/BadRequest"
          },
          "401": {
            "$ref": "../components/responses/errors.yaml#/Unauthorized"
          },
          "403": {
            "$ref": "../components/responses/errors.yaml#/Forbidden"
          },
          "404": {
            "$ref": "../components/responses/errors.yaml#/NotFound"
          },
          "409": {
            "$ref": "../components/responses/errors.yaml#/Conflict"
          },
          "500": {
            "$ref": "../components/responses/errors.yaml#/ServerError"
          }
        },
        "requestBody": {
          "required": true,
          "content": {
            "application/json": {
              "schema": {
                "type": "object",
                "additionalProperties": false,
                "required": [
                  "reason"
                ],
                "properties": {
                  "reason": {
                    "type": "string",
                    "minLength": 1,
                    "maxLength": 500,
                    "description": "Reason for rejecting the booking (required, 1-500 characters)",
                    "example": "I have an emergency and cannot drive today"
                  }
                }
              }
            }
          }
        },
        "parameters": [
          {
            "$ref": "../components/parameters/common.yaml#/IdPath"
          }
        ]
      }
    },
