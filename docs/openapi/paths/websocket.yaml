{
  "paths": {
    "/socket.io": {
      "get": {
        "operationId": "socketIoRealtimeStream",
        "summary": "Socket.IO real-time stream (chat, presence, notifications)",
        "description": "Socket.IO handshake endpoint used for live data streaming.\n\nUse your JWT access token during handshake authentication.\n\nAuthentication options:\n1. `auth.token` in Socket.IO client options (recommended).\n2. `Authorization: Bearer <token>` handshake header.\n\nEvent streams covered:\n- Chat messages and read/delivery receipts.\n- Typing indicators.\n- Presence checks/heartbeats.\n- Real-time notifications (`notification:new`).\n\nSend Keys (client -> server):\n- `chat:send`: `receiverId`, `text`, `clientMsgId`, `type`, `payloadJson`\n- `chat:typing`: `conversationId`, `receiverId`\n- `chat:stopTyping`: `conversationId`, `receiverId`\n- `chat:read`: `conversationId`, `lastReadMessageId`\n- `chat:sync`: `lastMessageTs`\n- `presence:check`: `userId`\n\nReceive Keys (server -> client):\n- `chat:message`: `id`, `conversationId`, `senderId`, `receiverId`, `type`, `text`, `payloadJson`, `clientMsgId`, `createdAt`\n- `chat:delivered`: `messageId`, `conversationId`, `deliveredAt`\n- `chat:typing`: `conversationId`, `senderId`\n- `chat:stopTyping`: `conversationId`, `senderId`\n- `chat:read`: `conversationId`, `readBy`, `lastReadMessageId`, `readAt`\n- `chat:sync`: `messages`\n- `notification:new`: `type`, `data.id`, `data.title`, `data.body`, `data.notificationType`, `data.data`, `data.preview`, `data.createdAt`",
        "tags": [
          "WebSocket"
        ],
        "security": [
          {
            "BearerAuth": []
          }
        ],
        "parameters": [
          {
            "name": "EIO",
            "in": "query",
            "required": false,
            "schema": {
              "type": "string",
              "enum": [
                "4"
              ],
              "default": "4"
            },
            "description": "Engine.IO protocol version."
          },
          {
            "name": "transport",
            "in": "query",
            "required": false,
            "schema": {
              "type": "string",
              "enum": [
                "polling",
                "websocket"
              ],
              "default": "polling"
            },
            "description": "Socket.IO transport. Start with polling then upgrade to websocket."
          },
          {
            "name": "Authorization",
            "in": "header",
            "required": false,
            "schema": {
              "type": "string"
            },
            "description": "Optional bearer token handshake header: `Bearer <accessToken>`."
          }
        ],
        "responses": {
          "200": {
            "description": "Engine.IO polling handshake initialized.",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/EngineIoHandshakeResponse"
                },
                "examples": {
                  "pollingHandshake": {
                    "value": {
                      "sid": "v8kRj8A2gL6mXk2TAAAB",
                      "upgrades": [
                        "websocket"
                      ],
                      "pingInterval": 25000,
                      "pingTimeout": 60000,
                      "maxPayload": 1000000
                    }
                  }
                }
              }
            }
          },
          "101": {
            "description": "WebSocket upgrade successful (`transport=websocket`)."
          },
          "401": {
            "$ref": "../components/responses/errors.yaml#/Unauthorized"
          },
          "500": {
            "$ref": "../components/responses/errors.yaml#/ServerError"
          }
        },
        "x-socketio": {
          "namespace": "/",
          "authentication": {
            "required": true,
            "methods": [
              "auth.token",
              "authorization-header"
            ]
          },
          "clientToServerEvents": [
            {
              "event": "chat:send",
              "payload": {
                "$ref": "#/components/schemas/WsChatSendPayload"
              },
              "ack": {
                "$ref": "#/components/schemas/WsChatSendAck"
              }
            },
            {
              "event": "chat:typing",
              "payload": {
                "$ref": "#/components/schemas/WsChatTypingRequest"
              }
            },
            {
              "event": "chat:stopTyping",
              "payload": {
                "$ref": "#/components/schemas/WsChatTypingRequest"
              }
            },
            {
              "event": "chat:read",
              "payload": {
                "$ref": "#/components/schemas/WsChatReadRequest"
              }
            },
            {
              "event": "chat:sync",
              "payload": {
                "$ref": "#/components/schemas/WsChatSyncRequest"
              },
              "ack": {
                "$ref": "#/components/schemas/WsChatSyncAck"
              }
            },
            {
              "event": "presence:ping",
              "payload": {
                "type": "object",
                "additionalProperties": false
              }
            },
            {
              "event": "presence:check",
              "payload": {
                "$ref": "#/components/schemas/WsPresenceCheckRequest"
              },
              "ack": {
                "$ref": "#/components/schemas/WsPresenceCheckAck"
              }
            }
          ],
          "serverToClientEvents": [
            {
              "event": "chat:message",
              "payload": {
                "$ref": "#/components/schemas/WsChatMessageEvent"
              }
            },
            {
              "event": "chat:delivered",
              "payload": {
                "$ref": "#/components/schemas/WsChatDeliveredEvent"
              }
            },
            {
              "event": "chat:typing",
              "payload": {
                "$ref": "#/components/schemas/WsChatTypingEvent"
              }
            },
            {
              "event": "chat:stopTyping",
              "payload": {
                "$ref": "#/components/schemas/WsChatTypingEvent"
              }
            },
            {
              "event": "chat:read",
              "payload": {
                "$ref": "#/components/schemas/WsChatReadEvent"
              }
            },
            {
              "event": "chat:sync",
              "payload": {
                "$ref": "#/components/schemas/WsChatSyncPushEvent"
              }
            },
            {
              "event": "notification:new",
              "payload": {
                "$ref": "#/components/schemas/WsNotificationNewEvent"
              }
            }
          ]
        }
      }
    },
    "/socket.io/events": {
