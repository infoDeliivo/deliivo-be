                  }
                }
              }
            }
          },
          "400": {
            "$ref": "../components/responses/errors.yaml#/BadRequest"
          },
          "401": {
            "$ref": "../components/responses/errors.yaml#/Unauthorized"
          },
          "403": {
            "$ref": "../components/responses/errors.yaml#/Forbidden"
          },
          "404": {
            "$ref": "../components/responses/errors.yaml#/NotFound"
          },
          "409": {
            "$ref": "../components/responses/errors.yaml#/Conflict"
          },
          "500": {
            "$ref": "../components/responses/errors.yaml#/ServerError"
          }
        },
        "requestBody": {
          "required": true,
          "content": {
            "application/json": {
              "schema": {
                "type": "object",
                "additionalProperties": false,
                "required": [
                  "rideId",
                  "seatsBooked"
                ],
                "properties": {
                  "rideId": {
                    "type": "string",
                    "format": "uuid"
                  },
                  "segmentId": {
                    "type": "string"
                  },
                  "seatsBooked": {
                    "type": "integer",
                    "minimum": 1,
                    "maximum": 4
                  },
                  "luggageCount": {
                    "type": "integer",
                    "minimum": 0,
                    "maximum": 10
                  },
                  "pickupWaypointId": {
                    "type": "string",
                    "format": "uuid"
                  },
                  "dropoffWaypointId": {
                    "type": "string",
                    "format": "uuid"
                  },
                  "notes": {
                    "type": "string"
                  }
                }
              }
            }
          }
        }
      },
      "get": {
        "operationId": "bookingsGet",
        "summary": "GET bookings/",
        "tags": [
          "Bookings"
        ],
        "security": [
          {
            "BearerAuth": []
          }
        ],
        "responses": {
          "200": {
            "description": "Success",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "../components/schemas/common.yaml#/ApiSuccessEnvelope"
                },
                "examples": {
                  "default": {
                    "$ref": "../components/examples/common.yaml#/BookingSuccess"
                  }
                }
              }
            }
          },
          "400": {
            "$ref": "../components/responses/errors.yaml#/BadRequest"
          },
          "401": {
            "$ref": "../components/responses/errors.yaml#/Unauthorized"
          },
          "403": {
            "$ref": "../components/responses/errors.yaml#/Forbidden"
          },
          "404": {
            "$ref": "../components/responses/errors.yaml#/NotFound"
          },
          "409": {
            "$ref": "../components/responses/errors.yaml#/Conflict"
          },
          "500": {
            "$ref": "../components/responses/errors.yaml#/ServerError"
          }
        },
        "parameters": [
          {
            "$ref": "../components/parameters/common.yaml#/CursorQuery"
          },
          {
            "$ref": "../components/parameters/common.yaml#/LimitQuery"
          }
        ]
      }
    },
    "/api/v1/bookings/{id}": {
      "get": {
        "operationId": "bookingsGetById",
        "summary": "GET bookings/:id - Get booking details with OTPs",
        "description": "Retrieve booking details. If booking is CONFIRMED or IN_PROGRESS, includes pickup and drop OTPs that passenger should show to driver.",
        "tags": [
          "Bookings"
        ],
        "security": [
          {
            "BearerAuth": []
          }
        ],
        "responses": {
          "200": {
            "description": "Success - Returns booking with OTPs if confirmed",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "../components/schemas/common.yaml#/ApiSuccessEnvelope"
                },
                "examples": {
                  "confirmed": {
                    "$ref": "../components/examples/common.yaml#/BookingConfirmedWithOtp"
                  },
                  "pending": {
                    "$ref": "../components/examples/common.yaml#/BookingSuccess"
                  }
                }
              }
            }
          },
          "400": {
            "$ref": "../components/responses/errors.yaml#/BadRequest"
          },
          "401": {
            "$ref": "../components/responses/errors.yaml#/Unauthorized"
          },
          "403": {
            "$ref": "../components/responses/errors.yaml#/Forbidden"
          },
          "404": {
            "$ref": "../components/responses/errors.yaml#/NotFound"
          },
          "409": {
            "$ref": "../components/responses/errors.yaml#/Conflict"
          },
          "500": {
            "$ref": "../components/responses/errors.yaml#/ServerError"
          }
        },
        "parameters": [
          {
            "$ref": "../components/parameters/common.yaml#/IdPath"
          },
          {
            "$ref": "../components/parameters/common.yaml#/CursorQuery"
          },
          {
            "$ref": "../components/parameters/common.yaml#/LimitQuery"
          }
        ]
      }
    },
    "/api/v1/bookings/{id}/payment/confirm": {
      "post": {
        "operationId": "bookingsPostByIdPaymentConfirm",
        "summary": "POST bookings/:id/payment/confirm",
        "tags": [
          "Bookings"
        ],
        "security": [
          {
            "BearerAuth": []
          }
        ],
        "responses": {
          "200": {
            "description": "Success",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "../components/schemas/common.yaml#/ApiSuccessEnvelope"
                },
                "examples": {
                  "default": {
                    "$ref": "../components/examples/common.yaml#/BookingSuccess"
                  }
                }
              }
            }
          },
          "400": {
            "$ref": "../components/responses/errors.yaml#/BadRequest"
          },
          "401": {
            "$ref": "../components/responses/errors.yaml#/Unauthorized"
          },
          "403": {
            "$ref": "../components/responses/errors.yaml#/Forbidden"
          },
          "404": {
            "$ref": "../components/responses/errors.yaml#/NotFound"
          },
          "409": {
            "$ref": "../components/responses/errors.yaml#/Conflict"
          },
          "500": {
            "$ref": "../components/responses/errors.yaml#/ServerError"
          }
        },
        "parameters": [
          {
            "$ref": "../components/parameters/common.yaml#/IdPath"
          }
        ]
      }
    },
    "/api/v1/bookings/{id}/cancel": {
      "post": {
        "operationId": "bookingsPostByIdCancel",
        "summary": "POST bookings/:id/cancel - Cancel booking with refund",
        "description": "Cancel a booking. If driver decision deadline has expired, rider gets 100% refund. Otherwise, refund is based on time-based cancellation policy.",
        "tags": [
          "Bookings"
        ],
        "security": [
          {
            "BearerAuth": []
          }
        ],
        "responses": {
          "200": {
            "description": "Success - Booking cancelled with refund details",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "../components/schemas/common.yaml#/ApiSuccessEnvelope"
                },
                "examples": {
                  "deadlineExpired": {
                    "value": {
                      "success": true,
                      "message": "Booking cancelled successfully",
                      "data": {
                        "bookingId": "booking-uuid",
                        "rideId": "ride-uuid",
                        "refundPercent": 100,
                        "refundAmount": 20.00,
                        "refundInitiated": true
                      }
                    }
                  },
                  "normalCancel": {
                    "value": {
                      "success": true,
                      "message": "Booking cancelled successfully",
                      "data": {
                        "bookingId": "booking-uuid",
                        "rideId": "ride-uuid",
                        "refundPercent": 80,
                        "refundAmount": 16.00,
                        "refundInitiated": true
                      }
                    }
                  }
                }
              }
            }
          },
          "400": {
            "$ref": "../components/responses/errors.yaml#/BadRequest"
          },
          "401": {
            "$ref": "../components/responses/errors.yaml#/Unauthorized"
          },
          "403": {
            "$ref": "../components/responses/errors.yaml#/Forbidden"
          },
          "404": {
            "$ref": "../components/responses/errors.yaml#/NotFound"
          },
          "409": {
            "$ref": "../components/responses/errors.yaml#/Conflict"
          },
          "500": {
            "$ref": "../components/responses/errors.yaml#/ServerError"
          }
        },
        "parameters": [
          {
            "$ref": "../components/parameters/common.yaml#/IdPath"
          }
        ]
      }
    },
    "/api/v1/bookings/{id}/extend-wait": {
      "post": {
        "operationId": "bookingsPostByIdExtendWait",
        "summary": "POST bookings/:id/extend-wait - Extend driver response deadline",
        "description": "Extend the driver decision deadline by 1 hour when the initial deadline has expired. Can only be used once per booking. Driver will be notified of the extension.",
        "tags": [
          "Bookings"
        ],
        "security": [
          {
            "BearerAuth": []
          }
        ],
        "responses": {
          "200": {
            "description": "Success - Waiting period extended",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "../components/schemas/common.yaml#/ApiSuccessEnvelope"
                },
                "examples": {
                  "default": {
                    "value": {
                      "success": true,
                      "message": "Waiting period extended successfully",
                      "data": {
                        "bookingId": "booking-uuid",
                        "status": "DRIVER_PENDING",
                        "newDeadline": "2026-05-13T11:00:00.000Z",
                        "extendedBy": "rider"
                      }
                    }
                  }
                }
              }
            }
          },
          "400": {
            "description": "Bad Request - Deadline has not expired yet",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "../components/schemas/common.yaml#/ApiErrorEnvelope"
                },
                "examples": {
                  "deadlineNotExpired": {
                    "value": {
                      "success": false,
                      "message": "Deadline has not expired yet"
                    }
                  }
                }
              }
            }
          },
          "401": {
            "$ref": "../components/responses/errors.yaml#/Unauthorized"
          },
          "404": {
            "description": "Not Found - Booking not found",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "../components/schemas/common.yaml#/ApiErrorEnvelope"
                },
                "examples": {
                  "notFound": {
                    "value": {
                      "success": false,
                      "message": "Booking not found"
                    }
                  }
                }
              }
            }
          },
          "409": {
            "description": "Conflict - Cannot extend wait",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "../components/schemas/common.yaml#/ApiErrorEnvelope"
                },
                "examples": {
                  "notDriverPending": {
                    "value": {
                      "success": false,
                      "message": "Booking is not waiting for driver confirmation"
                    }
                  },
                  "alreadyExtended": {
                    "value": {
                      "success": false,
                      "message": "Waiting period already extended"
                    }
                  }
                }
              }
            }
          },
          "500": {
            "$ref": "../components/responses/errors.yaml#/ServerError"
          }
        },
        "parameters": [
          {
            "$ref": "../components/parameters/common.yaml#/IdPath"
          }
        ]
      }
    }
  }
}
