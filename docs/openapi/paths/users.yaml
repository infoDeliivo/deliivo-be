                          "chatty_when_comfortable",
                          "quiet"
                        ]
                      },
                      "pets": {
                        "type": "string",
                        "enum": [
                          "love_pets",
                          "depends_on_animal",
                          "no_pets"
                        ]
                      }
                    }
                  }
                }
              }
            }
          }
        }
